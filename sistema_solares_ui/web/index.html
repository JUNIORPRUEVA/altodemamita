<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Panel web PWA de supervision y administracion de Sistema Solares.">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#12385F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sistema Solares">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sistema Solares | Panel Web</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (async function bootstrapApp() {
      const appSignatureKey = 'sistema_solares_ui.app_signature';
      const reloadGuardKey = 'sistema_solares_ui.reload_guard';
      const preflightResetKey = 'sistema_solares_ui.preflight_cache_reset.v2';
      const runtimeConfigUrl = `app-config.json?v=${Date.now()}`;
      const versionUrl = `version.json?v=${Date.now()}`;

      function log(message, details) {
        if (details === undefined) {
          console.info('[SistemaSolares Bootstrap]', message);
          return;
        }
        console.info('[SistemaSolares Bootstrap]', message, details);
      }

      async function fetchJson(url) {
        const response = await fetch(url, {
          cache: 'no-store',
          credentials: 'same-origin',
          headers: {
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
          },
        });

        if (!response.ok) {
          throw new Error(`Request failed for ${url}: ${response.status}`);
        }

        return response.json();
      }

      async function clearBrowserState() {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const cacheKeys = await caches.keys();
          await Promise.all(cacheKeys.map((cacheKey) => caches.delete(cacheKey)));
        }

        if (window.localStorage) {
          window.localStorage.clear();
        }

        if (window.sessionStorage) {
          window.sessionStorage.clear();
        }

        if (window.indexedDB && typeof window.indexedDB.databases === 'function') {
          const databases = await window.indexedDB.databases();
          await Promise.all(
            databases
              .map((database) => database.name)
              .filter((name) => typeof name === 'string' && name.length > 0)
              .map((name) => new Promise((resolve) => {
                const request = window.indexedDB.deleteDatabase(name);
                request.onsuccess = () => resolve();
                request.onerror = () => resolve();
                request.onblocked = () => resolve();
              })),
          );
        }
      }

      async function runPreflightCacheReset() {
        const expectedMarker = `${window.location.origin}|cache-reset-v2`;
        const previousMarker = window.sessionStorage
          ? window.sessionStorage.getItem(preflightResetKey)
          : null;

        if (previousMarker === expectedMarker) {
          return false;
        }

        const hasController = 'serviceWorker' in navigator && !!navigator.serviceWorker.controller;
        const hasCacheStorage = 'caches' in window;

        if (!hasController && !hasCacheStorage) {
          if (window.sessionStorage) {
            window.sessionStorage.setItem(preflightResetKey, expectedMarker);
          }
          return false;
        }

        log('Running preflight cache reset.', {
          origin: window.location.origin,
          hasController,
          hasCacheStorage,
        });
        await clearBrowserState();
        if (window.sessionStorage) {
          window.sessionStorage.setItem(preflightResetKey, expectedMarker);
        }
        return true;
      }

      function buildSignature(versionInfo, appConfig) {
        const version = versionInfo && typeof versionInfo.version === 'string'
          ? versionInfo.version
          : 'unknown-version';
        const buildId = versionInfo && typeof versionInfo.build === 'string'
          ? versionInfo.build
          : 'unknown-build';
        const apiBaseUrl = appConfig && typeof appConfig.API_BASE_URL === 'string'
          ? appConfig.API_BASE_URL
          : 'unknown-api';

        return `${version}|${buildId}|${apiBaseUrl}`;
      }

      async function loadBootstrap(signature) {
        const script = document.createElement('script');
        script.src = `flutter_bootstrap.js?v=${encodeURIComponent(signature)}`;
        script.async = true;
        document.body.appendChild(script);
        log('Loading Flutter bootstrap.', { signature });
      }

      try {
        const preflightResetApplied = await runPreflightCacheReset();
        if (preflightResetApplied) {
          window.location.replace(window.location.pathname + window.location.search + window.location.hash);
          return;
        }

        const [versionInfo, appConfig] = await Promise.all([
          fetchJson(versionUrl),
          fetchJson(runtimeConfigUrl),
        ]);

        const signature = buildSignature(versionInfo, appConfig);
        const previousSignature = window.localStorage.getItem(appSignatureKey);
        const reloadGuard = window.sessionStorage.getItem(reloadGuardKey);

        log('Resolved runtime configuration.', {
          apiBaseUrl: appConfig.API_BASE_URL,
          signature,
          previousSignature,
          reloadGuard,
        });

        if (previousSignature && previousSignature !== signature && reloadGuard !== signature) {
          log('Detected runtime signature change. Clearing browser state.');
          await clearBrowserState();
          window.localStorage.setItem(appSignatureKey, signature);
          window.sessionStorage.setItem(reloadGuardKey, signature);
          window.location.replace(window.location.pathname + window.location.search + window.location.hash);
          return;
        }

        window.localStorage.setItem(appSignatureKey, signature);
        window.sessionStorage.removeItem(reloadGuardKey);
        await loadBootstrap(signature);
      } catch (error) {
        console.error('[SistemaSolares Bootstrap] Failed to load runtime configuration.', error);
        await loadBootstrap(Date.now().toString());
      }
    })();
  </script>
</body>
</html>
