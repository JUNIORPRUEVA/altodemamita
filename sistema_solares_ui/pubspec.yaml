name: sistema_solares_ui
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.0.0
  google_fonts: ^6.2.1
  http: ^1.5.0
  intl: ^0.20.2
  provider: ^6.1.5
  socket_io_client: ^3.1.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: ../lib/assets/logo/logoprincipal_windows_icon.png
  web:
    generate: true
    image_path: ../lib/assets/logo/logoprincipal_windows_icon.png
    background_color: "#00000000"
    theme_color: "#12385F"
  windows:
    generate: true
    image_path: ../lib/assets/logo/logoprincipal_windows_icon.png
    icon_size: 256
